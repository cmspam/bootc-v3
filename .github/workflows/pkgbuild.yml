name: Build and Publish bootc + bootupd

on:
  schedule:
    # Daily at 14:00 UTC — 4 hours before cache22's 18:00 image build,
    # so cache22's pacman -S sees fresh v3-rebuilt bootc binaries.
    - cron: '0 14 * * *'
  workflow_dispatch:

concurrency:
  group: build
  cancel-in-progress: false

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      bootc_ver:   ${{ steps.get_tag.outputs.bootc_ver }}
      bootupd_ver: ${{ steps.get_tag.outputs.bootupd_ver }}
      tag:         ${{ steps.get_tag.outputs.tag }}
      needs_build: ${{ steps.check.outputs.needs_build }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get latest AUR versions for bootc + bootupd
        id: get_tag
        run: |
          fetch() {
            curl -s "https://aur.archlinux.org/rpc/?v=5&type=info&arg=$1" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['results'][0]['Version'])"
          }
          BOOTC_VER=$(fetch bootc)
          BOOTUPD_VER=$(fetch bootupd)
          # Combined tag: <bootc>_<bootupd>
          TAG="${BOOTC_VER}_${BOOTUPD_VER}"
          echo "Latest bootc:   $BOOTC_VER"
          echo "Latest bootupd: $BOOTUPD_VER"
          echo "Combined tag:   $TAG"
          {
            echo "bootc_ver=$BOOTC_VER"
            echo "bootupd_ver=$BOOTUPD_VER"
            echo "tag=$TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Check if already built
        id: check
        run: |
          # Force daily rebuild against current Arch state. Pre-built
          # binaries on rolling Arch get stale as upstream library
          # sonames bump (libalpm, openssl, glibc, …). Rebuilding
          # daily keeps everything linked against current libs even
          # when AUR pkgver hasn't changed.
          LATEST="${{ steps.get_tag.outputs.tag }}"
          LAST="$(cat last_built_version.txt 2>/dev/null || echo '')"
          echo "Last built: '$LAST' | Latest: '$LATEST' (forced rebuild)"
          echo "needs_build=true" >> "$GITHUB_OUTPUT"

  build:
    needs: get-version
    if: needs.get-version.outputs.needs_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: v3
            docker_image: cachyos/cachyos-v3

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build bootc + bootupd packages
        run: |
          mkdir -p build
          docker run --rm \
            --privileged \
            -v "$PWD/build:/pkg" \
            "${{ matrix.docker_image }}" \
            bash -c "
              set -e
              echo '=== Initializing keyring ==='
              pacman-key --init
              pacman-key --populate archlinux cachyos

              echo '=== Updating system ==='
              pacman -Syu --noconfirm

              echo '=== Installing build dependencies ==='
              pacman -S --noconfirm --needed base-devel git rust cargo ostree

              echo '=== Setting up build user ==='
              useradd -m builder
              echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder

              echo '=== Override -march=native to x86-64-v3 ==='
              # cachyos-v3 default makepkg.conf uses -march=native and
              # -C target-cpu=native. GHA runners are AMD EPYC so that
              # emits AMD-only SSE4a instructions (INSERTQ/EXTRQ) which
              # SIGILL on Intel CPUs. Pin to v3 baseline.
              printf 'RUSTFLAGS=\"-C opt-level=3 -C target-cpu=x86-64-v3\"\nDEBUG_RUSTFLAGS=\"-C debuginfo=2\"\n' \
                  > /etc/makepkg.conf.d/rust.conf
              sed -i 's/-march=native/-march=x86-64-v3 -mtune=generic/' /etc/makepkg.conf
              echo '--- effective flags ---'
              grep -E 'CFLAGS=|RUSTFLAGS=' /etc/makepkg.conf /etc/makepkg.conf.d/rust.conf

              # Generic build-one-AUR-package helper
              build_aur() {
                  local pkg=\$1
                  echo \"=== Cloning AUR/\$pkg ===\"
                  rm -rf /tmp/\$pkg
                  git clone --depth 1 https://aur.archlinux.org/\$pkg.git /tmp/\$pkg
                  chown -R builder:builder /tmp/\$pkg
                  echo \"=== Extracting sources for \$pkg ===\"
                  su builder -c \"cd /tmp/\$pkg && makepkg --noconfirm --skippgpcheck --nobuild -s\" || true
                  echo \"=== Initialising git in source dirs (\$pkg) ===\"
                  for d in /tmp/\$pkg/src/*/; do
                    if [ -d \"\$d\" ] && [ ! -d \"\$d/.git\" ]; then
                      su builder -c \"cd '\$d' && git init && git add -A && git commit -m init\" 2>/dev/null || true
                    fi
                  done
                  echo \"=== Building \$pkg ===\"
                  chown -R builder:builder /tmp/\$pkg
                  su builder -c \"cd /tmp/\$pkg && makepkg --noconfirm --skippgpcheck -e\"
                  cp /tmp/\$pkg/*.pkg.tar.zst /pkg/
              }

              build_aur bootc
              build_aur bootupd

              echo '=== Built packages ==='
              ls -la /pkg/
            "

      - name: Generate pacman database (covers bootc + bootupd)
        run: |
          REPO_NAME="bootc-v3"
          mkdir -p /tmp/repo
          cp build/*.pkg.tar.zst /tmp/repo/

          docker run --rm \
            -v /tmp/repo:/repo \
            "${{ matrix.docker_image }}" \
            bash -c "
              pacman -Sy --noconfirm --needed pacman 2>&1 | tail -3
              cd /repo
              repo-add ${REPO_NAME}.db.tar.gz *.pkg.tar.zst
              ln -sf ${REPO_NAME}.db.tar.gz ${REPO_NAME}.db
              ln -sf ${REPO_NAME}.files.tar.gz ${REPO_NAME}.files
            "

      - name: Create versioned release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.get-version.outputs.tag }}"
          VERSIONED_TAG="${TAG}-${{ matrix.target }}"

          gh release delete "$VERSIONED_TAG" --yes 2>/dev/null || true
          git push origin ":refs/tags/$VERSIONED_TAG" 2>/dev/null || true

          gh release create "$VERSIONED_TAG" \
            --title "bootc ${{ needs.get-version.outputs.bootc_ver }} + bootupd ${{ needs.get-version.outputs.bootupd_ver }} (${{ matrix.target }})" \
            --notes "bootc + bootupd built for x86-64-v3." \
            build/*.pkg.tar.zst

      - name: Update latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.get-version.outputs.tag }}"
          LATEST_TAG="latest-${{ matrix.target }}"
          REPO_NAME="bootc-v3"

          gh release delete "$LATEST_TAG" --yes 2>/dev/null || true
          git push origin ":refs/tags/$LATEST_TAG" 2>/dev/null || true

          NOTES=$(printf '[%s]\nSigLevel = Optional\nServer = https://github.com/cmspam/bootc-v3/releases/download/%s' "$REPO_NAME" "$LATEST_TAG")

          gh release create "$LATEST_TAG" \
            --title "bootc + bootupd latest (${{ matrix.target }}) - ${TAG}" \
            --notes "$NOTES" \
            build/*.pkg.tar.zst \
            /tmp/repo/${REPO_NAME}.db.tar.gz \
            /tmp/repo/${REPO_NAME}.db \
            /tmp/repo/${REPO_NAME}.files.tar.gz \
            /tmp/repo/${REPO_NAME}.files

  record-version:
    needs: [get-version, build]
    if: needs.get-version.outputs.needs_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          TAG="${{ needs.get-version.outputs.tag }}"
          echo "$TAG" > last_built_version.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_built_version.txt
          git commit -m "chore: record built version $TAG [skip ci]"
          git push
